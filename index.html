<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arda Haul Tracker</title>
<style>
:root{
  --bg:#11131a;
  --panel:#1c2130;
  --panel2:#242b3d;
  --border:#3a4766;
  --accent:#d5b15f;
  --text:#ece7db;
  --muted:#aeb4c2;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:
    radial-gradient(circle at top,#24304a 0%,transparent 35%),
    linear-gradient(180deg,#0d1017 0%,var(--bg) 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.card{
  width:min(720px,100%);
  background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%);
  border:1px solid var(--border);
  border-radius:18px;
  padding:28px;
  box-shadow:0 18px 48px rgba(0,0,0,.35);
}
.eyebrow{
  color:var(--accent);
  font-size:12px;
  font-weight:800;
  letter-spacing:2px;
  text-transform:uppercase;
}
h1{
  margin:10px 0 8px;
  font-size:34px;
  line-height:1.1;
}
p{
  margin:0;
  color:var(--muted);
  line-height:1.6;
  font-size:16px;
}
.status{
  margin-top:18px;
  display:inline-flex;
  gap:8px;
  align-items:center;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid #d5b15f44;
  background:#d5b15f12;
  color:var(--accent);
  font-size:13px;
  font-weight:700;
}
</style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">D&D 5e Tracker</div>
    <h1>Arda Haul</h1>
    <p>This repository is ready for a full interactive character tracker. The first published page is live, and the detailed tracker can now be generated and deployed through the Codex workflow.</p>
    <div class="status">Starter Site Ready</div>
  </main>
</body>
</html>
